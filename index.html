<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Klimax Felmérés</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #f9f0eb 0%, #f5e6dc 40%, #ede0d4 100%);
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  a { color: #c8785a; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Fade-in animáció */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.45s ease both; }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: rgba(200,160,140,0.2);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #d4917a, #c07060);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Kártya */
  .card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 28px;
    padding: 48px 44px;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 8px 48px rgba(180,120,100,0.13);
    border: 1px solid rgba(210,170,150,0.25);
    position: relative;
    z-index: 2;
  }
  @media (max-width: 640px) {
    .card { padding: 32px 22px; }
  }

  /* Tipográfia */
  .logo-text {
    font-size: 11px; letter-spacing: 4px; color: #b08878;
    text-transform: uppercase; text-align: center; margin-bottom: 8px;
  }
  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, #c8a090, transparent);
    margin: 0 auto 32px;
  }
  .section-label {
    font-size: 11px; letter-spacing: 3px; color: #b08878;
    text-transform: uppercase; margin-bottom: 16px; display: block;
  }
  .card-title {
    font-size: 26px; color: #5c3a2e; font-weight: normal;
    line-height: 1.4; margin-bottom: 10px; font-style: italic;
  }
  .card-subtitle {
    font-size: 14px; color: #9a7060; line-height: 1.8; margin-bottom: 36px;
  }
  .question-text {
    font-size: 18px; color: #5c3a2e; line-height: 1.6;
    margin-bottom: 24px; font-style: italic;
  }

  /* Form elemek */
  textarea, input[type=number], input[type=text] {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid rgba(200,160,140,0.4);
    border-radius: 14px;
    background: rgba(255,255,255,0.6);
    font-size: 15px; color: #5c3a2e;
    font-family: 'Georgia', serif;
    outline: none; transition: border-color 0.2s;
  }
  textarea {
    min-height: 110px; resize: vertical; line-height: 1.6;
  }
  textarea:focus, input:focus {
    border-color: rgba(200,120,90,0.6);
  }

  /* Gomb */
  .btn-primary {
    margin-top: 28px; width: 100%; padding: 16px;
    background: linear-gradient(135deg, #c8785a, #b06048);
    color: white; border: none; border-radius: 50px;
    font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; font-family: 'Georgia', serif;
    box-shadow: 0 4px 20px rgba(180,90,70,0.25);
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); opacity: 0.92; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

  /* Badge */
  .badge {
    display: inline-block; padding: 4px 14px;
    background: rgba(200,120,90,0.1); border-radius: 20px;
    font-size: 11px; letter-spacing: 2px; color: #b08878;
    text-transform: uppercase; margin-bottom: 18px;
  }

  /* Eredmény dobozok */
  .ai-box {
    font-size: 15px; color: #5c3a2e; line-height: 2;
    background: rgba(250,240,235,0.7); padding: 22px;
    border-radius: 16px; border: 1px solid rgba(200,160,140,0.2);
    margin-bottom: 16px;
  }
  .kb-box {
    font-size: 13px; color: #7a5545; line-height: 2;
    background: rgba(240,228,220,0.5); padding: 18px 22px;
    border-radius: 14px; border: 1px dashed rgba(200,150,120,0.35);
    margin-bottom: 16px;
  }
  .kb-label {
    font-size: 10px; letter-spacing: 3px; color: #b08878;
    text-transform: uppercase; margin-bottom: 10px; display: block;
  }
  .bridge-box {
    padding: 16px 20px;
    border-left: 3px solid #c8785a;
    background: rgba(200,120,90,0.06);
    border-radius: 0 12px 12px 0;
    font-size: 13px; color: #9a6050;
    font-style: italic; line-height: 1.8; margin-bottom: 24px;
  }
  .refs-box {
    margin-top: 8px; padding-top: 20px;
    border-top: 1px solid rgba(200,160,140,0.25);
  }
  .refs-title {
    font-size: 10px; letter-spacing: 3px; color: #b08878;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .ref-item {
    font-size: 11px; color: #a07060; line-height: 1.9;
    display: flex; gap: 6px; margin-bottom: 2px;
  }
  .ref-num { color: #c8785a; flex-shrink: 0; }

  /* Loading */
  .loading-wrap { text-align: center; padding: 30px 0; }
  .loading-icon { font-size: 36px; margin-bottom: 20px; }
  .loading-text { font-size: 18px; color: #8a5a4a; font-style: italic; }

  /* Superscript hivatkozás */
  sup a { font-size: 10px; color: #c8785a; font-style: normal; }
</style>
</head>

const KB = [
  { keywords:["hőhullám","hohullam","höhullam","izzad","hőség","kipirulás","forróság","meleg","forró"], title:"Hőhullámok és izzadás", refs:[1,9,10,13,14], bridge:"A sejtek hőháztartásának sejtszintű szabályozása és a terahertz-tartomány kapcsolata egy izgalmas kutatási irány – erről hamarosan részletesebben is mesélünk.",
    text:`A hőhullám a klimaxos nők 60–80%-ának jelent gondot,[13] és átlagosan 7 évig, de sokaknál 10–14 évig is fennáll.[13] Az ösztrogéncsökkenés a hypothalamus hőszabályozó zónáját szűkíti, így minimális hőmérséklet-változás is kipirulást és izzadást vált ki.[1] Ami kifejezetten klimaxos nőkkel végzett vizsgálatokban bizonyítottan enyhíti a tüneteket: a koffein és alkohol kerülése, hűvösebb hálószoba, és lassú légzőgyakorlatok – egy RCT-ben ez akár 40%-kal csökkentette az epizódok zavarásszintjét.[14] Nagyméretű MsFLASH klimax-vizsgálatban az SSRI-típusú gyógyszerek 40–60%-os tünetcsökkenést adtak.[10]` },
  { keywords:["éjszaka","ejszaka","éjjel","felébred","veríték","éjszakai"], title:"Éjszakai hőhullámok", refs:[2,9,14], bridge:"A sejtszintű hőháztartás és a terahertz-frekvenciás terápia kapcsolatát jelenleg aktívan kutatják – erre a témára visszatérünk.",

  { keywords:["hízás","hizas","súly","kilo","kilók","fogyni","elhízás","kg","testsúly","zsír","hasi"], title:"Súlygyarapodás és anyagcsere", refs:[8,19,20], bridge:"Az anyagcsere sejtszintű aktiválása – különösen a mitokondriális funkcióra ható módszerek – egy izgalmas irány, amiről hamarosan mesélünk.",
    text:`A klimaxos súlygyarapodás valódi biológiai folyamat, nem akaraterő kérdése. Az ösztrogéncsökkenés az anyagcserét úgy változtatja meg, hogy a zsír a csípőről a has felé vándorol – a nők 50–70%-ánál megfigyelhető stabil étkezés mellett is.[8] Menopauzális nőkkel végzett vizsgálatok szerint a mediterrán típusú étrend és rezisztenciaedzés kombinációja csökkenti a zsigeri zsírt és javítja az inzulinérzékenységet.[19] Heti 150 perc mozgás + 2-3 erősítő edzés bizonyítottan a legjobb eredményt adja ebben a korban.[20]` },
  { keywords:["anyagcsere","inzulin","vércukor","metabol","lassú","lassult"], title:"Lelassult anyagcsere", refs:[8,19,20], bridge:"A sejtek energiatermelési hatékonyságát célzó terápiák a metabolikus menopauzás egészség legfontosabb kutatási területévé váltak.",
    text:`Az ösztrogéncsökkenés közvetlenül rontja az inzulinérzékenységet menopauzás nőknél – ugyanannyi étel több zsírt raktároz el, mint korábban.[19] Klinikai vizsgálatok szerint a rezisztenciaedzés hatékonyabb ebben a korban, mint az aerob edzés önmagában, mert növeli az izomtömeget és emeli az alapanyagcserét.[20] D-vitamin és magnézium pótlása szintén ajánlott, mert hiányuk rontja az inzulinérzékenységet.[8]` },

    text:`A klimaxos nők 40–60%-a jelez alvászavart, és közel 26%-nál krónikus inszomnia alakul ki.[9] Hormonális változások, éjszakai hőhullámok és csökkent melatonin-szekréció állnak a háttérben.[2] A legjobb bizonyítékkal rendelkező kezelés klimaxos nőknél a kognitív viselkedésterápia inszomniára (CBT-I): vizsgálatokban 70–80%-os javulást ért el gyógyszer nélkül is.[2] Kisebb RCT-ben a fennel-valeriána kombináció szignifikánsan javította az alvásminőséget posztmenopauzális nőknél.[17]` },

  { keywords:["hangulat","ideges","ingerlékenység","dühös","sírós","szorongás","félelem","pánik","nyugtalan"], title:"Hangulatingadozás és ingerlékenység", refs:[3,11,21], bridge:"Az idegrendszer sejtszintű kommunikációjának frekvenciaalapú modulációja friss és izgalmas kutatási terület – erről hamarosan hallani fogsz.",
    text:`A menopauzális átmenet alatt a depressziós tünetek és szorongás kockázata 2–3-szorosra nő.[3] Az ösztrogén ingadozása közvetlenül befolyásolja a szerotonin-, noradrenalin- és dopaminrendszert – ez magyarázza a hirtelen érzelmi hullámokat. Ez nem jellemhiba, hanem biológia.[3] Ami klinikai vizsgálatokban hatékonynak bizonyult klimaxos nőknél: rendszeres mozgás, mindfulness, és szükség esetén SSRI/SNRI-k – amelyek egyidejűleg a hőhullámokat is csökkentik.[11]` },
  { keywords:["depresszi","szomor","reménytelen","kedvetlen","örömtelen","búskomorság"], title:"Depressziós tünetek", refs:[3,21], bridge:"A hangulatszabályozás és a sejtek elektromos kommunikációja között feltárt összefüggések egészen új megközelítéseket nyitnak meg.",
    text:`A perimenopauzális időszakban az agy hippocampusa közvetlenül érzékeny az ösztrogéncsökkenésre: klinikai adatok szerint a hippocampális volumen és a BDNF-jelátvitel is csökken.[3] Ha a tünetek tartósak, orvosi segítség indokolt. Ami önállóan is bizonyítottan sokat segít klimaxos nőknél: napi 30 perc aerob mozgás, omega-3 zsírsavak, és a szociális kapcsolatok ápolása.[21]` },
  { keywords:["libidó","libido","szex","vágy","nem kívánom","párkapcsolat","intimitás","nemi vágy"], title:"Libidócsökkenés", refs:[4,7,21], bridge:"A perifériás keringés és szöveti regeneráció – amiről hamarosan szó lesz – a szexuális egészségre is közvetlen hatással van.",
    text:`A libidócsökkenés hátterében egyszerre van jelen a hormonális változás, pszichológiai tényezők, és sokszor a hüvelyszárazság okozta fájdalom.[4] A NAMS állásfoglalása szerint a GSM kezelése önmagában javítja a szexuális életet.[4] Szexuálterápia és párterápia a pszichológiai réteget célozzák; egyes vizsgálatokban a transzdermális tesztoszteron is eredményes volt klimaxos nőknél.[21]` },
  { keywords:["hüvely","huvely","szárazság","száraz","fájdalmas","éget","dyspareunia","hüvelyszárazság"], title:"Hüvelyszárazság (GSM)", refs:[4,7], bridge:"A nyálkahártya sejtszintű regenerációja és a szöveti vérátáramlás javítása egy olyan megközelítés, amiről hamarosan részleteket osztunk meg.",

  { keywords:["hajhullás","hajhullas","haj hull","ritkuló haj","hajam"], title:"Hajhullás", refs:[5,6,8], bridge:"A hajhagymák mikrocirkulációjának javítása – amit az újabb terápiás készülékek céloznak – ígéretes irány a hajritkülás menopauzás kezelésében.",
    text:`A menopauzális hajhullás az androgén/ösztrogén arány eltolódásából ered.[5] Vas, D-vitamin, B12, cink és fehérjebevitel hiánya drámaian fokozza a hajhullást klimaxos nőknél – laborvizsgálattal érdemes ellenőrizni.[6] Topikális minoxidil nőknél klinikai vizsgálatokban igazoltan lassítja a hajhullást és fokozza az újranövést.[5]` },

    text:`A klimax után a bőr kollagéntartalma évente kb. 2%-kal csökken, a ceramidszint is esik – együtt okozva a szárazságot, petyhüdtséget és ráncok gyorsabb mélyülését.[5] Ami bizonyítottan segít: napi SPF50 fényvédelem (az UV a fő külső ok), ceramid-tartalmú hidratálók, és C-vitamin szérum.[5] Kollagén-peptid kiegészítők napi 10g adagban kisebb RCT-kben javítottak a bőrfeszességen 3 hónapos szedés után.[5]` },
  { keywords:["öregszem","öregedés","öregség","korosodás","nőiesség"], title:"Az öregedés érzete", refs:[5,8,21], bridge:"A sejtszintű regeneráció és szövetek fiatalítása – ahogy azt a modern wellness-kutatások vizsgálják – egészen új lehetőségeket nyit meg.",
    text:`Az öregedés érzete sokszor mélyebb identitásbeli változással jár – ez teljesen normális reakció.[21] Ami aktívan segít: rendszeres mozgás lassítja a biológiai öregedést (telomerhossz-vizsgálatok igazolják),[8] antioxidáns-gazdag étrend védi a sejteket a gyulladástól,[8] és a UV-védelem bizonyítottan a legfontosabb tényező a bőr kollagénjének megőrzéséhez.[5]` },
  { keywords:["ízület","izulet","csont","osteopor","törés","merevség"], title:"Ízületi fájdalom és csontegészség", refs:[6,8,15], bridge:"A csontsejtek és kötőszöveti sejtek vibráció- és frekvenciarezonanciaválasza ígéretes kutatási irány – erről hamarosan részleteket osztunk meg.",
    text:`Az ösztrogén csontprotektív hatásának elvesztése miatt 50 év feletti nők több mint 50%-ánál alakul ki osteopenia vagy osteoporosis.[6] Az EMAS és NAMS által elsővonalbeli prevencióként ajánlott klimaxos nőknél: napi 1000–1200 mg kalcium, 800–1000 NE D-vitamin, és rendszeres súlyterheléses mozgás.[6] Az omega-3 zsírsavak gyulladáscsökkentő hatása ízületi panaszoknál szintén igazolt.[15]` },
  { keywords:["puffadás","vízvisszatartás","ödéma","dagad"], title:"Puffadás és vízvisszatartás", refs:[8,21], bridge:"A nyirokrendszer és a sejtek folyadékháztartása – amit a Ventum-típusú terápiák céloznak – közvetlen hatással van erre a panaszra.",
    text:`A klimax körüli puffadás hátterében a progeszteron csökkenése áll – ez a hormon természetes vízhajtó hatású volt.[21] Ami segít: sóbevitel csökkentése, magnézium pótlása B6-vitaminnal kombinálva, és elegendő folyadékfogyasztás – paradox módon több ivás segít a vízvisszatartáson.[8]` },
];

// ── SEGÉDFÜGGVÉNYEK ──────────────────────────────────────────
function findMatch(t1, t5) {
  const c = ((t1||"")+" "+(t5||"")).toLowerCase();
  let best = null, top = 0;
  for (const e of KB) {
    let s = 0;
    for (const kw of e.keywords) if (c.includes(kw)) s++;
    if (s > top) { top = s; best = e; }
  }
  return best || KB[0];
}

function CitedText({ text, onRef }) {
  const parts = text.split(/(\[\d+\])/g);
  return React.createElement(React.Fragment, null,
    ...parts.map((p, i) => {
      const m = p.match(/^\[(\d+)\]$/);
      if (m) {
        const n = parseInt(m[1]);
        onRef(n);
        return React.createElement('sup', {key:i},
          React.createElement('a', {href: REFS[n]?.url, target:"_blank", rel:"noreferrer"}, `[${n}]`)
        );
      }
      return React.createElement('span', {key:i}, p);
    })
  );
}

// ── KÉRDÉSEK ─────────────────────────────────────────────────
const QUESTIONS = [
  {id:"q1", label:"1. kérdés", q:"Mi a Te legnagyobb problémád, kihívásod, félelmed a nőiséged hanyatlásával kapcsolatban?", type:"textarea", ph:"Írd le szabadon, amit érezel..."},
  {id:"q3", label:"2. kérdés", q:"Hány hónapja zavar ez a helyzet?", type:"number", ph:"pl. 12"},
  {id:"q4", label:"3. kérdés", q:"Hányféle módszerrel próbálkoztál eddig?", type:"number", ph:"pl. 3"},
  {id:"q5", label:"4. kérdés", q:"Mi az az egyetlen legkellemetlenebb panasz, ami elsőre eszedbe jut?", type:"text", ph:"pl. hőhullám, alvászavar..."},
];

// ── FŐ APP ───────────────────────────────────────────────────
function App() {
  const [step, setStep]       = useState(0);
  const [answers, setAnswers] = useState({q1:"",q3:"",q4:"",q5:""});
  const [current, setCurrent] = useState("");
  const [result, setResult]   = useState(null);
  const [loading, setLoading] = useState(false);
  const [dots, setDots]       = useState(1);
  const usedRefs = useRef(new Set());

  useEffect(() => {
    if (loading) {
      const iv = setInterval(() => setDots(d => d===3?1:d+1), 500);
      return () => clearInterval(iv);
    }
  }, [loading]);

  const totalQ = QUESTIONS.length;
  const progress = step===0 ? 0 : Math.min(Math.round((step/totalQ)*100), 100);
  const isLast = step === totalQ;
  const curQ = step>=1 && step<=totalQ ? QUESTIONS[step-1] : null;

  const next = () => {
    if (step>=1 && step<=totalQ) {
      setAnswers(prev => ({...prev, [QUESTIONS[step-1].id]: current}));
    }
    setCurrent("");
    setStep(s => s+1);
  };

  const submit = async () => {
    const fa = {...answers, [QUESTIONS[step-1].id]: current};
    setAnswers(fa);
    setLoading(true);
    setStep(5);

    const match = findMatch(fa.q1, fa.q5);
    usedRefs.current = new Set(match.refs);

    const months  = parseInt(fa.q3)||0;
    const methods = parseInt(fa.q4)||0;
    const mText   = months>0 ? `${months} hónapja` : "egy ideje";
    const meText  = methods===0 ? "eddig még nem találtál igazán hatásos megoldást"
                  : methods===1 ? "már próbálkoztál egy módszerrel"
                  : `${methods} módszert is kipróbáltál már`;
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:900,
          messages:[{role:"user", content:
`Te egy empatikus, tudományosan megalapozott egészségtanácsadó vagy, aki KIZÁRÓLAG klimaxos nőkkel foglalkozik.

Egy nő töltötte ki a kérdőívünket:
- Legnagyobb kihívása: "${fa.q1}"
- Hány hónapja zavarja: ${mText}
- Módszerek: ${meText}
- Legkellemetlenebb panasz: "${fa.q5}"

Releváns klinikai tudásbázis (KIZÁRÓLAG klimaxos nőkre vonatkozó vizsgálatokból):
${match.text}

Írj személyes, meleg visszajelzést (4-5 mondat, folyó szöveg, NEM felsorolás):
1. Empatikusan tükrözd vissza a helyzetét a konkrét tünete és időtartama alapján
2. Adj 2-3 konkrét tanácsot a fenti klimax-specifikus klinikai adatokból
3. Hangsúlyozd természetesen, hogy ezek NEM általános tanácsok, hanem kimondottan klimaxos nőkre vonatkozó vizsgálatokból származnak
4. Zárj kíváncsiságot ébresztő mondattal a sejtszintű megközelítésről

Magyarul, meleg hangon. A szövegbe NE kerüljenek hivatkozási számok.`
          }]
        })
      });
      const data = await resp.json();
      setResult({ text: data.content?.[0]?.text || match.text, match });
    } catch {
      setResult({ text: match.text, match });
    }
    setLoading(false);
    setStep(6);
  };

  // ── RENDER ────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",position:"relative"}}>

      {/* Virág háttér */}
      {[[5,2,60,15,0.12],[15,null,80,-20,0.10],[null,10,50,30,0.08],[null,20,70,-10,0.11]].map(([top,bot,sz,rot,op],i)=>(
        <div key={i} style={{position:"fixed",top:top?`${top}%`:undefined,bottom:bot?`${bot}%`:undefined,[i%2===0?"left":"right"]:"3%",pointerEvents:"none",zIndex:0}}>
          <svg width={sz} height={sz} viewBox="0 0 100 100" style={{transform:`rotate(${rot}deg)`,opacity:op}}>
            {[0,45,90,135].map(a=><ellipse key={a} cx="50" cy="50" rx="18" ry="36" transform={`rotate(${a} 50 50)`} fill="#c8a4a4"/>)}
            <circle cx="50" cy="50" r="12" fill="#e8c5b0"/>
          </svg>
        </div>
      ))}

      <div className="card fade-up">
        <div className="logo-text">Klimax Felmérés</div>
        <div className="divider"></div>

        {step>0 && step<=totalQ && (
          <div className="progress-bar">
            <div className="progress-fill" style={{width:`${progress}%`}}></div>
          </div>
        )}

        {/* INTRO */}
        {step===0 && (
          <div className="fade-up">
            <div className="card-title">Kedves Hölgyem,</div>
            <p className="card-subtitle">
              Ez a rövid felmérés segít megérteni, miben tudunk a legjobban segíteni Neked a klimax tünetei kapcsán.
              <br/><br/>
              4 kérdés után <strong>személyre szabott, tudományos alapú visszajelzést</strong> kapsz – kifejezetten klimaxos nőkre vonatkozó klinikai vizsgálatokból.
            </p>
            <button className="btn-primary" onClick={next}>Kezdjük el →</button>
          </div>
        )}

        {/* KÉRDÉSEK */}
        {step>=1 && step<=totalQ && curQ && (
          <div className="fade-up">
            <span className="section-label">{curQ.label}</span>
            <div className="question-text">{curQ.q}</div>
            {curQ.type==="textarea"
              ? <textarea placeholder={curQ.ph} value={current} onChange={e=>setCurrent(e.target.value)} rows="4"/>
              : <input type={curQ.type} placeholder={curQ.ph} value={current} onChange={e=>setCurrent(e.target.value)}/>
            }
            <button className="btn-primary" onClick={isLast?submit:next} disabled={!current.trim()}>
              {isLast ? "Visszajelzést kérek ✦" : "Következő →"}
            </button>
          </div>
        )}

        {/* TÖLTÉS */}
        {loading && (
          <div className="loading-wrap fade-up">
            <div className="loading-icon">✦</div>
            <div className="loading-text">Személyes visszajelzésedet készítem{".".repeat(dots)}</div>
          </div>
        )}

        {/* EREDMÉNY */}
        {step===6 && result && (
          <div className="fade-up">
            <span className="section-label">Személyes visszajelzésed</span>
            <div className="badge">{result.match.title}</div>

            <div className="ai-box">{result.text}</div>

            <div className="kb-box">
              <span className="kb-label">📋 Tudományos háttér – kizárólag klimaxos nőkre vonatkozó klinikai adatok</span>
              <CitedText text={result.match.text} onRef={n => usedRefs.current.add(n)} />
            </div>

            <div className="bridge-box">✦ {result.match.bridge}</div>

            <div className="refs-box">
              <div className="refs-title">Felhasznált klinikai források</div>
              {[...usedRefs.current].sort((a,b)=>a-b).map(n => REFS[n] && (
                <div key={n} className="ref-item">
                  <span className="ref-num">[{n}]</span>
                  <a href={REFS[n].url} target="_blank" rel="noreferrer">{REFS[n].label}</a>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
